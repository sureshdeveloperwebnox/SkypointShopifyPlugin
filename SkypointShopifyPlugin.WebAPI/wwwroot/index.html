<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skypoint Shipping - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: bold;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .msg {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .msg.error {
            background: #fee;
            color: #c33;
        }

        .msg.success {
            background: #efe;
            color: #2a7a2a;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <h1>Skypoint Shipping</h1>
            <p>Shopify Integration</p>
        </div>

        <div id="msg" class="msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn" id="loginBtn">Login</button>
        </form>

        <div class="toggle-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const shop = (params.get('shop') || '').replace(/^https?:\/\//i, '').replace(/\/$/, '');

        // If already logged in this session, go straight to dashboard
        if (sessionStorage.getItem('skypoint_token')) {
            redirect();
        }

        function redirect() {
            window.location.href = shop
                ? 'dashboard.html?shop=' + encodeURIComponent(shop)
                : 'dashboard.html';
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
            el.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            document.getElementById('msg').style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const loginUrl = shop
                ? '/api/auth/login?shop=' + encodeURIComponent(shop)
                : '/api/auth/login';

            try {
                const response = await fetch(loginUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, pwd: password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store token in sessionStorage — lives only for this browser session,
                    // never written to disk, cleared when tab closes.
                    sessionStorage.setItem('skypoint_token', data.token);
                    sessionStorage.setItem('skypoint_user', JSON.stringify(data.user || {}));
                    if (shop) sessionStorage.setItem('skypoint_shop', shop);

                    showMsg('Login successful! Redirecting...', 'success');
                    setTimeout(redirect, 600);
                } else {
                    showMsg(data.error || 'Login failed. Check your credentials.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Login';
                }
            } catch (err) {
                console.error('Login error:', err);
                showMsg('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>

</html>
