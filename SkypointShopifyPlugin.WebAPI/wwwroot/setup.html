<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skypoint Shipping - Configuration Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 26px;
        }

        .logo p {
            color: #888;
            font-size: 13px;
            margin-top: 4px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        input[type=text], input[type=password] {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        input[type=text]:focus, input[type=password]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.92;
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            line-height: 1.5;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .note {
            font-size: 12px;
            color: #999;
            margin-top: 12px;
            text-align: center;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .col {
            flex: 1;
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            margin: 0 5px;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <h1>Skypoint Shipping</h1>
            <p>Centralized Configuration Setup</p>
        </div>

        <div class="section">
            <div class="section-title">Shopify Configuration</div>
            
            <label>Client ID</label>
            <input type="text" id="shopifyClientId" placeholder="Your Shopify Client ID" />
            
            <label>Client Secret</label>
            <input type="password" id="shopifyClientSecret" placeholder="Your Shopify Client Secret" />
            
            <label>Redirect URI</label>
            <input type="text" id="shopifyRedirectUri" placeholder="https://your-ngrok-url.ngrok-free.dev/api/shopify/auth" />
            
            <label>Webhook Secret</label>
            <input type="password" id="shopifyWebhookSecret" placeholder="Your Shopify Webhook Secret" />
        </div>

        <div class="section">
            <div class="section-title">Skypoint API Configuration</div>
            
            <label>Base URL</label>
            <input type="text" id="skypointBaseUrl" placeholder="https://uat.skypoint.online" />
            
            <label>Login Endpoint</label>
            <input type="text" id="skypointLoginEndpoint" placeholder="/api/service/session/customer/login" />
            
            <label>Rate Endpoint</label>
            <input type="text" id="skypointRateEndpoint" placeholder="/api/service/rate/engine/quote" />
            
            <label>Booking Endpoint</label>
            <input type="text" id="skypointBookingEndpoint" placeholder="/api/service/booking/create" />
        </div>

        <div class="section">
            <div class="section-title">Parcel Dimensions (cm)</div>
            
            <div class="row">
                <div class="col">
                    <label>Length</label>
                    <input type="text" id="parcelLength" placeholder="10.0" />
                </div>
                <div class="col">
                    <label>Breadth</label>
                    <input type="text" id="parcelBreadth" placeholder="10.0" />
                </div>
            </div>
            
            <div class="row">
                <div class="col">
                    <label>Height</label>
                    <input type="text" id="parcelHeight" placeholder="10.0" />
                </div>
                <div class="col">
                    <label>Mass (kg)</label>
                    <input type="text" id="parcelMass" placeholder="0.5" />
                </div>
            </div>
        </div>

        <button class="btn" id="btn" onclick="saveConfiguration()">Save Configuration</button>

        <div class="alert alert-success" id="ok"></div>
        <div class="alert alert-error" id="err"></div>

        <p class="note">Configuration will be saved to data/app_config.json</p>
        
        <div class="toggle-link">
            <a href="index.html">Go to Login Page</a> | 
            <a href="register.html">Register</a>
        </div>
    </div>

    <script>
        // Load existing configuration on page load
        window.addEventListener('DOMContentLoaded', loadConfiguration);

        async function loadConfiguration() {
            try {
                const res = await fetch('/api/configuration');
                if (res.ok) {
                    const config = await res.json();
                    
                    // Populate Shopify fields
                    if (config.shopify) {
                        document.getElementById('shopifyClientId').value = config.shopify.clientId || '';
                        document.getElementById('shopifyClientSecret').value = config.shopify.clientSecret || '';
                        document.getElementById('shopifyRedirectUri').value = config.shopify.redirectUri || '';
                        document.getElementById('shopifyWebhookSecret').value = config.shopify.webhookSecret || '';
                    }
                    
                    // Populate Skypoint API fields
                    if (config.skypointApi) {
                        document.getElementById('skypointBaseUrl').value = config.skypointApi.baseUrl || 'https://uat.skypoint.online';
                        document.getElementById('skypointLoginEndpoint').value = config.skypointApi.loginEndpoint || '/api/service/session/customer/login';
                        document.getElementById('skypointRateEndpoint').value = config.skypointApi.rateEndpoint || '/api/service/rate/engine/quote';
                        document.getElementById('skypointBookingEndpoint').value = config.skypointApi.bookingEndpoint || '/api/service/booking/create';
                    }
                    
                    // Populate parcel dimensions
                    if (config.skypointMappings) {
                        document.getElementById('parcelLength').value = config.skypointMappings.defaultParcelLength || '10.0';
                        document.getElementById('parcelBreadth').value = config.skypointMappings.defaultParcelBreadth || '10.0';
                        document.getElementById('parcelHeight').value = config.skypointMappings.defaultParcelHeight || '10.0';
                        document.getElementById('parcelMass').value = config.skypointMappings.defaultParcelMass || '0.5';
                    }
                }
            } catch (e) {
                console.error('Failed to load configuration:', e);
            }
        }

        async function saveConfiguration() {
            const btn = document.getElementById('btn');
            const ok = document.getElementById('ok');
            const err = document.getElementById('err');

            ok.style.display = 'none';
            err.style.display = 'none';

            const config = {
                shopify: {
                    clientId: document.getElementById('shopifyClientId').value.trim(),
                    clientSecret: document.getElementById('shopifyClientSecret').value.trim(),
                    redirectUri: document.getElementById('shopifyRedirectUri').value.trim(),
                    webhookSecret: document.getElementById('shopifyWebhookSecret').value.trim()
                },
                skypointApi: {
                    baseUrl: document.getElementById('skypointBaseUrl').value.trim() || 'https://uat.skypoint.online',
                    loginEndpoint: document.getElementById('skypointLoginEndpoint').value.trim() || '/api/service/session/customer/login',
                    registerEndpoint: '/api/service/session/customer/register',
                    rateEndpoint: document.getElementById('skypointRateEndpoint').value.trim() || '/api/service/rate/engine/quote',
                    bookingEndpoint: document.getElementById('skypointBookingEndpoint').value.trim() || '/api/service/booking/create',
                    timeoutSeconds: 30,
                    maxRetryAttempts: 3
                },
                skypointMappings: {
                    defaultParcelLength: parseFloat(document.getElementById('parcelLength').value) || 10.0,
                    defaultParcelBreadth: parseFloat(document.getElementById('parcelBreadth').value) || 10.0,
                    defaultParcelHeight: parseFloat(document.getElementById('parcelHeight').value) || 10.0,
                    defaultParcelMass: parseFloat(document.getElementById('parcelMass').value) || 0.5,
                    defaultParcelType: 'A4_Text_Book',
                    postalCodeMappings: {},
                    suburbMappings: {}
                }
            };

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await fetch('/api/configuration', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await res.json();

                if (res.ok) {
                    ok.innerHTML = `<strong>✓ Configuration Saved Successfully!</strong><br>
                    Your configuration has been saved to data/app_config.json<br><br>
                    You can now restart the application to apply the changes.`;
                    ok.style.display = 'block';
                } else {
                    showErr(data.error || 'Failed to save configuration');
                }
            } catch (e) {
                showErr('Network error: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Configuration';
            }
        }

        function showErr(msg) {
            const err = document.getElementById('err');
            err.textContent = msg;
            err.style.display = 'block';
        }
    </script>
</body>

</html>
