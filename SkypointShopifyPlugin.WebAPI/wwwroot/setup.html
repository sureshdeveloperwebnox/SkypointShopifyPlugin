<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTrack - Configuration Setup</title>
    <link class="styles" rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link class="styles" rel="stylesheet" href="css/site.css" />
    <link class="styles" rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Custom styles for the configuration page alerts */
        .msg {
            display: none;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            line-height: 1.5;
        }
        .msg.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .msg.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .section-divider {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 1.5rem 0;
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-layout" style="min-height: 100vh;">
        <!-- Top Navbar -->
        <nav class="navbar auth-navbar">
            <div class="navbar-container">
                <a class="navbar-brand" href="/">
                    <svg viewBox="0 0 220 50" width="180" height="40" style="vertical-align: middle;">
                        <defs>
                            <linearGradient id="skynet-red" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#ff1e27" />
                                <stop offset="100%" stop-color="#d30008" />
                            </linearGradient>
                        </defs>
                        <text x="5" y="32" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-style="italic" font-size="30" fill="url(#skynet-red)" letter-spacing="-1">SKYNET</text>
                        <text x="7" y="44" font-family="'Arial', sans-serif" font-weight="800" font-size="7.5" fill="#111111" letter-spacing="2.2">WORLDWIDE EXPRESS</text>
                        <path d="M 5 35 L 122 35" stroke="#ff1e27" stroke-width="1.5" />
                    </svg>
                </a>
                <div class="navbar-links" id="navLinks">
                    <!-- Populated dynamically by JS -->
                </div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="auth-content" style="background-image: linear-gradient(rgba(11, 15, 25, 0.8), rgba(11, 15, 25, 0.85)), url('images/skynet_bg.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
            <div class="auth-card" style="max-width: 800px; max-height: 88vh; overflow-y: auto;">
                <div class="text-center mb-4">
                    <h4 class="auth-card-title">Centralized Configuration</h4>
                    <p class="auth-card-subtitle">Set up your Shopify and Skypoint API credentials</p>
                </div>

                <form id="configForm" onsubmit="event.preventDefault(); saveConfiguration();">
                    <!-- Shopify Configuration -->
                    <div class="section-title-custom form-label-custom" style="font-size: 1rem; border-bottom: 1px solid rgba(255, 30, 39, 0.3); padding-bottom: 5px; margin-bottom: 15px; color: #ff1e27;">Shopify Configuration</div>
                    <div class="row">
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="shopifyClientId">Client ID</label>
                            <div class="input-container">
                                <input type="text" id="shopifyClientId" class="form-input-custom" placeholder="Shopify Client ID" required />
                            </div>
                        </div>
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="shopifyClientSecret">Client Secret</label>
                            <div class="input-container">
                                <input type="password" id="shopifyClientSecret" class="form-input-custom" placeholder="Shopify Client Secret" required />
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="shopifyRedirectUri">Redirect URI</label>
                            <div class="input-container">
                                <input type="text" id="shopifyRedirectUri" class="form-input-custom" placeholder="https://.../api/shopify/auth" required />
                            </div>
                        </div>
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="shopifyWebhookSecret">Webhook Secret</label>
                            <div class="input-container">
                                <input type="password" id="shopifyWebhookSecret" class="form-input-custom" placeholder="Shopify Webhook Secret" required />
                            </div>
                        </div>
                    </div>

                    <!-- Skypoint API Configuration -->
                    <div class="section-divider"></div>
                    <div class="section-title-custom form-label-custom" style="font-size: 1rem; border-bottom: 1px solid rgba(255, 30, 39, 0.3); padding-bottom: 5px; margin-bottom: 15px; color: #ff1e27;">Skypoint API Configuration</div>
                    <div class="row">
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="skypointBaseUrl">Base URL</label>
                            <div class="input-container">
                                <input type="text" id="skypointBaseUrl" class="form-input-custom" placeholder="https://uat.skypoint.online" required />
                            </div>
                        </div>
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="skypointLoginEndpoint">Login Endpoint</label>
                            <div class="input-container">
                                <input type="text" id="skypointLoginEndpoint" class="form-input-custom" placeholder="/api/.../login" required />
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="skypointRateEndpoint">Rate Endpoint</label>
                            <div class="input-container">
                                <input type="text" id="skypointRateEndpoint" class="form-input-custom" placeholder="/api/.../quote" required />
                            </div>
                        </div>
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="skypointBookingEndpoint">Booking Endpoint</label>
                            <div class="input-container">
                                <input type="text" id="skypointBookingEndpoint" class="form-input-custom" placeholder="/api/.../create" required />
                            </div>
                        </div>
                    </div>

                    <!-- Parcel Dimensions -->
                    <div class="section-divider"></div>
                    <div class="section-title-custom form-label-custom" style="font-size: 1rem; border-bottom: 1px solid rgba(255, 30, 39, 0.3); padding-bottom: 5px; margin-bottom: 15px; color: #ff1e27;">Default Parcel Dimensions</div>
                    <div class="row">
                        <div class="col-md-3 col-6 form-group-custom">
                            <label class="form-label-custom" for="parcelLength">Length (cm)</label>
                            <div class="input-container">
                                <input type="text" id="parcelLength" class="form-input-custom" placeholder="10.0" required />
                            </div>
                        </div>
                        <div class="col-md-3 col-6 form-group-custom">
                            <label class="form-label-custom" for="parcelBreadth">Breadth (cm)</label>
                            <div class="input-container">
                                <input type="text" id="parcelBreadth" class="form-input-custom" placeholder="10.0" required />
                            </div>
                        </div>
                        <div class="col-md-3 col-6 form-group-custom">
                            <label class="form-label-custom" for="parcelHeight">Height (cm)</label>
                            <div class="input-container">
                                <input type="text" id="parcelHeight" class="form-input-custom" placeholder="10.0" required />
                            </div>
                        </div>
                        <div class="col-md-3 col-6 form-group-custom">
                            <label class="form-label-custom" for="parcelMass">Mass (kg)</label>
                            <div class="input-container">
                                <input type="text" id="parcelMass" class="form-input-custom" placeholder="0.5" required />
                            </div>
                        </div>
                    </div>

                    <div id="ok" class="msg success"></div>
                    <div id="err" class="msg error"></div>

                    <div class="mt-4">
                        <button type="submit" class="btn-skynet-primary" id="btn">Save Configuration</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Check authentication and setup navbar links dynamically
        const token = sessionStorage.getItem('skypoint_token');
        const params = new URLSearchParams(window.location.search);
        const shop = params.get('shop') || sessionStorage.getItem('skypoint_shop') || '';
        const navLinks = document.getElementById('navLinks');

        if (token) {
            const dashUrl = shop ? 'dashboard_app.html?shop=' + encodeURIComponent(shop) : 'dashboard_app.html';
            navLinks.innerHTML = `<a href="${dashUrl}" class="nav-link-btn">Dashboard</a>`;
        } else {
            const loginUrl = shop ? 'login.html?shop=' + encodeURIComponent(shop) : 'login.html';
            const regUrl = shop ? 'register.html?shop=' + encodeURIComponent(shop) : 'register.html';
            navLinks.innerHTML = `
                <a href="${regUrl}" class="nav-link-btn">Register</a>
                <a href="${loginUrl}" class="nav-link-btn">Login</a>
            `;
        }

        // Load existing configuration on page load
        window.addEventListener('DOMContentLoaded', loadConfiguration);

        async function loadConfiguration() {
            try {
                const res = await fetch('/api/configuration');
                if (res.ok) {
                    const config = await res.json();
                    
                    // Populate Shopify fields
                    if (config.shopify) {
                        document.getElementById('shopifyClientId').value = config.shopify.clientId || '';
                        document.getElementById('shopifyClientSecret').value = config.shopify.clientSecret || '';
                        document.getElementById('shopifyRedirectUri').value = config.shopify.redirectUri || '';
                        document.getElementById('shopifyWebhookSecret').value = config.shopify.webhookSecret || '';
                    }
                    
                    // Populate Skypoint API fields
                    if (config.skypointApi) {
                        document.getElementById('skypointBaseUrl').value = config.skypointApi.baseUrl || 'https://uat.skypoint.online';
                        document.getElementById('skypointLoginEndpoint').value = config.skypointApi.loginEndpoint || '/api/service/session/customer/login';
                        document.getElementById('skypointRateEndpoint').value = config.skypointApi.rateEndpoint || '/api/service/rate/engine/quote';
                        document.getElementById('skypointBookingEndpoint').value = config.skypointApi.bookingEndpoint || '/api/service/booking/create';
                    }
                    
                    // Populate parcel dimensions
                    if (config.skypointMappings) {
                        document.getElementById('parcelLength').value = config.skypointMappings.defaultParcelLength || '10.0';
                        document.getElementById('parcelBreadth').value = config.skypointMappings.defaultParcelBreadth || '10.0';
                        document.getElementById('parcelHeight').value = config.skypointMappings.defaultParcelHeight || '10.0';
                        document.getElementById('parcelMass').value = config.skypointMappings.defaultParcelMass || '0.5';
                    }
                }
            } catch (e) {
                console.error('Failed to load configuration:', e);
            }
        }

        async function saveConfiguration() {
            const btn = document.getElementById('btn');
            const ok = document.getElementById('ok');
            const err = document.getElementById('err');

            ok.style.display = 'none';
            err.style.display = 'none';

            const config = {
                shopify: {
                    clientId: document.getElementById('shopifyClientId').value.trim(),
                    clientSecret: document.getElementById('shopifyClientSecret').value.trim(),
                    redirectUri: document.getElementById('shopifyRedirectUri').value.trim(),
                    webhookSecret: document.getElementById('shopifyWebhookSecret').value.trim()
                },
                skypointApi: {
                    baseUrl: document.getElementById('skypointBaseUrl').value.trim() || 'https://uat.skypoint.online',
                    loginEndpoint: document.getElementById('skypointLoginEndpoint').value.trim() || '/api/service/session/customer/login',
                    registerEndpoint: '/api/service/session/customer/register',
                    rateEndpoint: document.getElementById('skypointRateEndpoint').value.trim() || '/api/service/rate/engine/quote',
                    bookingEndpoint: document.getElementById('skypointBookingEndpoint').value.trim() || '/api/service/booking/create',
                    timeoutSeconds: 30,
                    maxRetryAttempts: 3
                },
                skypointMappings: {
                    defaultParcelLength: parseFloat(document.getElementById('parcelLength').value) || 10.0,
                    defaultParcelBreadth: parseFloat(document.getElementById('parcelBreadth').value) || 10.0,
                    defaultParcelHeight: parseFloat(document.getElementById('parcelHeight').value) || 10.0,
                    defaultParcelMass: parseFloat(document.getElementById('parcelMass').value) || 0.5,
                    defaultParcelType: 'A4_Text_Book',
                    postalCodeMappings: {},
                    suburbMappings: {}
                }
            };

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await fetch('/api/configuration', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await res.json();

                if (res.ok) {
                    ok.innerHTML = `<strong>✓ Configuration Saved Successfully!</strong><br>
                    Your configuration has been saved to data/app_config.json<br><br>
                    You can now restart the application to apply the changes.`;
                    ok.style.display = 'block';
                } else {
                    showErr(data.error || 'Failed to save configuration');
                }
            } catch (e) {
                showErr('Network error: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Configuration';
            }
        }

        function showErr(msg) {
            const err = document.getElementById('err');
            err.textContent = msg;
            err.style.display = 'block';
        }
    </script>
</body>
</html>
