<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTrack - Login</title>
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/site.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Extra styling for message to fit the theme */
        .msg {
            display: none;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        .msg.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .msg.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .msg.info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="auth-layout">
        <!-- Top Navbar -->
        <nav class="navbar auth-navbar">
            <div class="navbar-container">
                <a class="navbar-brand" href="/">
                    <svg viewBox="0 0 220 50" width="180" height="40" style="vertical-align: middle;">
                        <defs>
                            <linearGradient id="skynet-red" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#ff1e27" />
                                <stop offset="100%" stop-color="#d30008" />
                            </linearGradient>
                        </defs>
                        <text x="5" y="32" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-style="italic" font-size="30" fill="url(#skynet-red)" letter-spacing="-1">SKYNET</text>
                        <text x="7" y="44" font-family="'Arial', sans-serif" font-weight="800" font-size="7.5" fill="#111111" letter-spacing="2.2">WORLDWIDE EXPRESS</text>
                        <path d="M 5 35 L 122 35" stroke="#ff1e27" stroke-width="1.5" />
                    </svg>
                </a>
                <div class="navbar-links">
                    <a href="register.html" class="nav-link-btn">Register</a>
                    <a href="login.html" class="nav-link-btn active">Login</a>
                </div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="auth-content">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <h4 class="auth-card-title">Welcome to SkyTrack</h4>
                    <p class="auth-card-subtitle">Select your login method below</p>
                </div>

                <!-- SkyNet User Login (Azure Active Directory) -->
                <div class="mb-4">
                    <h5 class="form-label-custom" style="font-size: 0.9rem; text-align: center; margin-bottom: 1rem;">SkyNet User Login</h5>
                    <button type="button" class="btn-skynet-primary" id="btnAad">
                        <i class="fab fa-microsoft mr-2"></i> Login with Microsoft AAD
                    </button>
                </div>

                <div class="auth-divider"></div>

                <!-- SkyNet Client Login (Email/Password) -->
                <form id="loginForm">
                    <h5 class="form-label-custom" style="font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem;">SkyNet Client Login</h5>

                    <div class="form-group-custom">
                        <label class="form-label-custom" for="username">Email Address</label>
                        <div class="input-container">
                            <input type="email" id="username" name="username" class="form-input-custom" placeholder="name@example.com" required />
                        </div>
                    </div>

                    <div class="form-group-custom">
                        <label class="form-label-custom" for="password">Password</label>
                        <div class="input-container">
                            <input type="password" id="password" name="password" class="form-input-custom" placeholder="password" required />
                            <i class="fas fa-eye password-toggle-icon" id="togglePassword"></i>
                        </div>
                    </div>

                    <div id="msg" class="msg"></div>

                    <div class="mt-4">
                        <button type="submit" class="btn-skynet-primary" id="loginBtn">Login</button>
                        <a role="button" class="btn-skynet-secondary text-center d-block mt-2" href="/">Cancel</a>
                    </div>

                    <div class="text-center">
                        <a href="#" class="forgot-password-link">Forgot your password?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const shop = (params.get('shop') || '').replace(/^https?:\/\//i, '').replace(/\/$/, '');

        // Update URLs in navbar and other links to preserve the shop parameter if present
        if (shop) {
            document.querySelectorAll('a').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href !== '#' && href !== '/' && !href.includes('?')) {
                    link.setAttribute('href', href + '?shop=' + encodeURIComponent(shop));
                }
            });
        }

        // If already logged in this session, go straight to dashboard
        if (sessionStorage.getItem('skypoint_token')) {
            redirect();
        }

        function redirect() {
            window.location.href = shop
                ? 'dashboard_app.html?shop=' + encodeURIComponent(shop)
                : 'dashboard_app.html';
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
            el.style.display = 'block';
        }

        function hideMsg() {
            const el = document.getElementById('msg');
            el.style.display = 'none';
        }

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.className = type === 'password' ? 'fas fa-eye password-toggle-icon' : 'fas fa-eye-slash password-toggle-icon';
        });

        // AAD Button Click Handler
        document.getElementById('btnAad').addEventListener('click', async function () {
            showMsg('Redirecting to Microsoft Azure Active Directory...', 'info');
            await new Promise(resolve => setTimeout(resolve, 1500));
            redirect();
        });

        // Form Submit Handler
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            hideMsg();
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const loginUrl = shop
                ? '/api/auth/login?shop=' + encodeURIComponent(shop)
                : '/api/auth/login';

            try {
                const response = await fetch(loginUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, pwd: password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    sessionStorage.setItem('skypoint_token', data.token);
                    sessionStorage.setItem('skypoint_user', JSON.stringify(data.user || {}));
                    if (shop) sessionStorage.setItem('skypoint_shop', shop);

                    showMsg('Login successful! Redirecting...', 'success');
                    setTimeout(redirect, 600);
                } else {
                    showMsg(data.error || 'Login failed. Check your credentials.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Login';
                }
            } catch (err) {
                console.error('Login error:', err);
                showMsg('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
