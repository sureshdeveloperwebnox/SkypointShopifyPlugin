<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTrack - Dashboard</title>
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/site.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Additional Dashboard Styles that extend the central auth.css theme */
        .dashboard-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .dashboard-card {
            background: rgba(15, 22, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
        }

        .dashboard-card-title {
            font-weight: 800;
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 0.75rem;
            letter-spacing: -0.5px;
        }

        .dashboard-card-text {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .info-tile {
            background: rgba(15, 22, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .info-tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .info-tile h3 {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .info-tile .val {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .status-card {
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff1e27;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-reconnect {
            display: inline-block;
            margin-top: 15px;
            background: linear-gradient(135deg, #ff1e27 0%, #d30008 100%);
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(255, 30, 39, 0.3);
        }

        .btn-reconnect:hover {
            background: linear-gradient(135deg, #ff3d44 0%, #e6000a 100%);
            box-shadow: 0 6px 16px rgba(255, 30, 39, 0.45);
            transform: translateY(-1px);
            color: #ffffff;
            text-decoration: none;
        }

        .btn-navbar {
            color: #333333;
            background: transparent;
            border: 1px solid #cccccc;
            border-radius: 6px;
            padding: 0.5rem 1.25rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-navbar:hover {
            color: #ff1e27;
            border-color: #ff1e27;
            background: rgba(255, 30, 39, 0.05);
            text-decoration: none;
        }

        .navbar-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="auth-layout" style="background-image: linear-gradient(rgba(11, 15, 25, 0.8), rgba(11, 15, 25, 0.85)), url('images/skynet_bg.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; min-height: 100vh;">
        <!-- Top Navbar -->
        <nav class="navbar auth-navbar">
            <div class="navbar-container">
                <a class="navbar-brand" href="/">
                    <svg viewBox="0 0 220 50" width="180" height="40" style="vertical-align: middle;">
                        <defs>
                            <linearGradient id="skynet-red" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#ff1e27" />
                                <stop offset="100%" stop-color="#d30008" />
                            </linearGradient>
                        </defs>
                        <text x="5" y="32" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-style="italic" font-size="30" fill="url(#skynet-red)" letter-spacing="-1">SKYNET</text>
                        <text x="7" y="44" font-family="'Arial', sans-serif" font-weight="800" font-size="7.5" fill="#111111" letter-spacing="2.2">WORLDWIDE EXPRESS</text>
                        <path d="M 5 35 L 122 35" stroke="#ff1e27" stroke-width="1.5" />
                    </svg>
                </a>
                <div class="navbar-links">
                    <a id="configLink" class="btn-navbar">Configuration</a>
                    <button onclick="logout()" class="btn-navbar">Logout</button>
                </div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="dashboard-container">
            <div class="dashboard-card" id="welcomeCard">
                <h2 class="dashboard-card-title">Welcome to SkyTrack</h2>
                <div id="userInfo">
                    <p class="dashboard-card-text">Loading user details…</p>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-tile">
                    <h3>Account Number</h3>
                    <div class="val" id="accountNo">-</div>
                </div>
                <div class="info-tile">
                    <h3>Sales Code</h3>
                    <div class="val" id="salesCode">-</div>
                </div>
                <div class="info-tile">
                    <h3>Role</h3>
                    <div class="val" id="role">-</div>
                </div>
                <div class="info-tile">
                    <h3>Email</h3>
                    <div class="val" id="email">-</div>
                </div>
            </div>

            <div class="dashboard-card status-card" id="carrierStatusCard">
                <h3 class="dashboard-card-title" style="font-size: 1.25rem;">Skypoint Shipping — Carrier Service</h3>
                <div id="carrierStatus" class="dashboard-card-text" style="margin-top: 15px;">
                    <span class="spinner"></span> Setting up carrier service…
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Auth check ────────────────────────────────────────────────────────────
        const token = sessionStorage.getItem('skypoint_token');
        const params = new URLSearchParams(window.location.search);
        let shop = params.get('shop')
            || sessionStorage.getItem('skypoint_shop') || '';
        shop = shop.replace(/^https?:\/\//i, '').replace(/\/$/, '');

        if (!token) {
            // Not logged in — redirect back to login, preserving shop param
            window.location.href = shop
                ? 'login.html?shop=' + encodeURIComponent(shop)
                : 'login.html';
        } else {
            if (shop) sessionStorage.setItem('skypoint_shop', shop);
            // Set up configuration link href
            document.getElementById('configLink').href = shop ? 'setup.html?shop=' + encodeURIComponent(shop) : 'setup.html';
            init();
        }

        // ── Init ──────────────────────────────────────────────────────────────────
        async function init() {
            // Populate user profile from sessionStorage (set at login)
            const user = JSON.parse(sessionStorage.getItem('skypoint_user') || '{}');
            renderUser(user);

            // Auto-register carrier service for this shop
            if (shop) {
                document.getElementById('carrierStatusCard').style.display = 'block';
                await setupCarrier(shop);
            }
        }

        function renderUser(user) {
            document.getElementById('userInfo').innerHTML =
                '<p class="dashboard-card-text"><strong>Name:</strong> ' + (user.firstName || '') + ' ' + (user.lastName || '') + '</p>' +
                '<p class="dashboard-card-text"><strong>Email:</strong> ' + (user.email || user.username || '') + '</p>';
            document.getElementById('accountNo').textContent = user.accountNo || '-';
            document.getElementById('salesCode').textContent = user.salesCode || '-';
            document.getElementById('role').textContent = user.role || '-';
            document.getElementById('email').textContent = user.email || '-';
        }

        async function setupCarrier(shop) {
            const statusEl = document.getElementById('carrierStatus');
            try {
                const res = await fetch('/api/shopify/setup?shop=' + encodeURIComponent(shop), {
                    headers: { 'Authorization': 'Bearer ' + sessionStorage.getItem('skypoint_token') }
                });
                const data = await res.json();
                console.log('Carrier setup response:', data);

                if (data.success) {
                    statusEl.innerHTML = '<span style="color:#34d399; font-weight: 600;">✓ ' + data.message + '</span>';
                } else if (data.status === 'reinstall_required') {
                    const url = data.install_url || '/api/shopify?shop=' + encodeURIComponent(shop);
                    statusEl.innerHTML =
                        '<span style="color:#f87171; font-weight: 600;">⚠ ' + (data.message || 'Reconnect Shopify to continue.') + '</span>' +
                        '<br><a class="btn-reconnect" href="' + url + '" target="_top">Reconnect Shopify</a>';
                } else if (data.status === 'no_token') {
                    statusEl.innerHTML = '<span style="color:#94a3b8; font-weight: 600;">ℹ App not fully installed yet.</span>';
                } else {
                    statusEl.innerHTML = '<span style="color:#f87171; font-weight: 600;">⚠ ' + (data.message || data.error || 'Setup failed.') + '</span>';
                }
            } catch (e) {
                statusEl.innerHTML = '<span style="color:#94a3b8; font-weight: 600;">ℹ Carrier setup skipped: ' + e.message + '</span>';
            }
        }

        async function logout() {
            sessionStorage.clear();
            window.location.href = shop ? 'login.html?shop=' + encodeURIComponent(shop) : 'login.html';
        }
    </script>
</body>
</html>
