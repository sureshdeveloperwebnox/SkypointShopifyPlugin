<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTrack - Register</title>
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/site.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Extra styling for message to fit the theme */
        .msg {
            display: none;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        .msg.error, #error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .msg.success, #success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
    </style>
</head>
<body>
    <div class="auth-layout">
        <!-- Top Navbar -->
        <nav class="navbar auth-navbar">
            <div class="navbar-container">
                <a class="navbar-brand" href="/">
                    <svg viewBox="0 0 220 50" width="180" height="40" style="vertical-align: middle;">
                        <defs>
                            <linearGradient id="skynet-red" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#ff1e27" />
                                <stop offset="100%" stop-color="#d30008" />
                            </linearGradient>
                        </defs>
                        <text x="5" y="32" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-style="italic" font-size="30" fill="url(#skynet-red)" letter-spacing="-1">SKYNET</text>
                        <text x="7" y="44" font-family="'Arial', sans-serif" font-weight="800" font-size="7.5" fill="#111111" letter-spacing="2.2">WORLDWIDE EXPRESS</text>
                        <path d="M 5 35 L 122 35" stroke="#ff1e27" stroke-width="1.5" />
                    </svg>
                </a>
                <div class="navbar-links">
                    <a href="register.html" class="nav-link-btn active">Register</a>
                    <a href="login.html" class="nav-link-btn">Login</a>
                </div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="auth-content">
            <div class="auth-card" style="max-width: 550px;">
                <div class="text-center mb-4">
                    <h4 class="auth-card-title">Register as a SkyNet Client</h4>
                    <p class="auth-card-subtitle">Complete the fields below to create your account</p>
                </div>

                <form id="registerForm">
                    <div class="row">
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="firstName">First Name</label>
                            <div class="input-container">
                                <input type="text" id="firstName" name="firstName" class="form-input-custom" placeholder="John" required />
                            </div>
                        </div>

                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="lastName">Last Name</label>
                            <div class="input-container">
                                <input type="text" id="lastName" name="lastName" class="form-input-custom" placeholder="Doe" required />
                            </div>
                        </div>
                    </div>

                    <div class="form-group-custom">
                        <label class="form-label-custom" for="email">Email Address</label>
                        <div class="input-container">
                            <input type="email" id="email" name="email" class="form-input-custom" placeholder="john.doe@example.com" required />
                        </div>
                    </div>

                    <div class="form-group-custom">
                        <label class="form-label-custom" for="phone">Mobile Number</label>
                        <div class="input-container">
                            <input type="tel" id="phone" name="phone" class="form-input-custom" placeholder="+27 82 123 4567" required />
                        </div>
                    </div>

                    <div class="form-group-custom">
                        <label class="form-label-custom" for="accountNumber">SkyNet Account Number</label>
                        <div class="input-container">
                            <input type="text" id="accountNumber" name="accountNumber" class="form-input-custom" placeholder="J12345 (Optional)" />
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="password">Password</label>
                            <div class="input-container">
                                <input type="password" id="password" name="password" class="form-input-custom" placeholder="••••••••" minlength="6" required />
                                <i class="fas fa-eye password-toggle-icon" id="togglePassword"></i>
                            </div>
                        </div>

                        <div class="col-md-6 form-group-custom">
                            <label class="form-label-custom" for="confirmPassword">Confirm Password</label>
                            <div class="input-container">
                                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input-custom" placeholder="••••••••" required />
                            </div>
                        </div>
                    </div>

                    <div id="error" class="msg error"></div>
                    <div id="success" class="msg success"></div>

                    <div class="mt-4">
                        <button type="submit" class="btn-skynet-primary" id="registerBtn">Create Account</button>
                        <a role="button" class="btn-skynet-secondary text-center d-block mt-2" href="login.html">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const shop = (params.get('shop') || '').replace(/^https?:\/\//i, '').replace(/\/$/, '');

        // Update URLs in navbar and other links to preserve the shop parameter if present
        if (shop) {
            document.querySelectorAll('a').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href !== '#' && href !== '/' && !href.includes('?')) {
                    link.setAttribute('href', href + '?shop=' + encodeURIComponent(shop));
                }
            });
        }

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            confirmPasswordInput.setAttribute('type', type);
            this.className = type === 'password' ? 'fas fa-eye password-toggle-icon' : 'fas fa-eye-slash password-toggle-icon';
        });

        // Form Submit Handler
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            const btn = document.getElementById('registerBtn');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Password match validation
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Registering...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        firstName: firstName,
                        lastName: lastName,
                        phone: phone,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    successDiv.textContent = 'Registration successful! Redirecting to login...';
                    successDiv.style.display = 'block';
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        const loginUrl = shop ? 'login.html?shop=' + encodeURIComponent(shop) : 'login.html';
                        window.location.href = loginUrl;
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch (error) {
                console.error('Registration error:', error);
                errorDiv.textContent = 'An error occurred. Please try again.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
