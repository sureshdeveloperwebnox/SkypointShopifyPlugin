client_id = "43cc9e72087b61c72649cbabcd052072"
name = "Skypoint Shipping"
handle = "skypoint-shipping"
application_url = "https://0879-49-204-233-0.ngrok-free.app"
embedded = false

[build]
automatically_update_urls_on_dev = true

[access_scopes]
scopes = "read_orders,write_orders,read_products,write_products,read_shipping,write_shipping,read_fulfillments,write_fulfillments"

[auth]
redirect_urls = [
  "https://0879-49-204-233-0.ngrok-free.app/api/shopify/auth"
]

[webhooks]
api_version = "2024-04"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "https://0879-49-204-233-0.ngrok-free.app/api/shopify/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "https://0879-49-204-233-0.ngrok-free.app/api/shopify/orders/updated"

  [[webhooks.subscriptions]]
  topics = [ "orders/cancelled" ]
  uri = "https://0879-49-204-233-0.ngrok-free.app/api/shopify/orders/cancelled"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://0879-49-204-233-0.ngrok-free.app/api/shopify/app/uninstalled"

[webhooks.privacy_compliance]
