name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
      env:
        Shopify__ClientId: ${{ secrets.SHOPIFY_CLIENT_ID }}
        Shopify__ClientSecret: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        Shopify__RedirectUri: ${{ secrets.SHOPIFY_REDIRECT_URI }}
        Shopify__WebhookSecret: ${{ secrets.SHOPIFY_WEBHOOK_SECRET }}
    
    - name: Test
      run: dotnet test --no-restore --verbosity normal
      env:
        Shopify__ClientId: ${{ secrets.SHOPIFY_CLIENT_ID }}
        Shopify__ClientSecret: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        Shopify__RedirectUri: ${{ secrets.SHOPIFY_REDIRECT_URI }}
        Shopify__WebhookSecret: ${{ secrets.SHOPIFY_WEBHOOK_SECRET }}
